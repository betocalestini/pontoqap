services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: store
      POSTGRES_PASSWORD: store
      POSTGRES_DB: store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store -d store"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgres://store:store@postgres:5432/store?sslmode=disable
      MIGRATIONS_PATH: /migrations
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    profiles:
      - seed
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: seed
    environment:
      DATABASE_URL: postgres://store:store@postgres:5432/store?sslmode=disable
      APP_ENV: development
      SEED_ALLOW: "true"
      SEED_DATA_DIR: /devdata
      STORE_WEB_URL: http://localhost:5173
    volumes:
      - ./backend/devdata:/devdata:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://store:store@postgres:5432/store?sslmode=disable
      HTTP_ADDR: ":8080"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
      COOKIE_SECURE: "false"
      APP_ENV: development
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      STORE_WEB_URL: http://localhost:5173
      DEFAULT_CUSTOMER_CREDIT_LIMIT_CENTS: "50000"
      UPLOAD_DIR: /data/catalog-static
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-sandbox}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-sandbox-webhook-secret}
      # Demais MERCADO_PAGO_* (token, webhook secret, etc.) vêm só de env_file: .env — evita
      # ${VAR:-} vazio no shell sobrescrever o segredo carregado do arquivo.
      MERCADO_PAGO_ENVIRONMENT: ${MERCADO_PAGO_ENVIRONMENT:-test}
      MERCADO_PAGO_BASE_URL: ${MERCADO_PAGO_BASE_URL:-https://api.mercadopago.com}
      MERCADO_PAGO_APPLICATION_ID: ${MERCADO_PAGO_APPLICATION_ID:-}
      MERCADO_PAGO_PIX_EXPIRATION: ${MERCADO_PAGO_PIX_EXPIRATION:-PT24H}
      MERCADO_PAGO_REQUEST_TIMEOUT_SECONDS: ${MERCADO_PAGO_REQUEST_TIMEOUT_SECONDS:-10}
      MERCADO_PAGO_TEST_AUTO_APPROVE: ${MERCADO_PAGO_TEST_AUTO_APPROVE:-false}
    # Imagens: go:embed + COPY no Dockerfile. Bind-mount de static/ vazio no host oculta os arquivos da imagem e gera 404.
    # Para persistir uploads do admin no host: ./backend/internal/catalog/static/product-images:/data/catalog-static/product-images
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 15s
    depends_on:
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://store:store@postgres:5432/store?sslmode=disable
      APP_ENV: development
      WORKER_POLL_INTERVAL: 5s
      WORKER_ID: worker-1
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      STORE_WEB_URL: http://localhost:5173
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-sandbox}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-sandbox-webhook-secret}
      # MERCADO_PAGO_ACCESS_TOKEN e MERCADO_PAGO_WEBHOOK_SECRET: apenas env_file .env (ver serviço api).
      MERCADO_PAGO_ENVIRONMENT: ${MERCADO_PAGO_ENVIRONMENT:-test}
      MERCADO_PAGO_BASE_URL: ${MERCADO_PAGO_BASE_URL:-https://api.mercadopago.com}
      MERCADO_PAGO_APPLICATION_ID: ${MERCADO_PAGO_APPLICATION_ID:-}
      MERCADO_PAGO_PIX_EXPIRATION: ${MERCADO_PAGO_PIX_EXPIRATION:-PT24H}
      MERCADO_PAGO_REQUEST_TIMEOUT_SECONDS: ${MERCADO_PAGO_REQUEST_TIMEOUT_SECONDS:-10}
      MERCADO_PAGO_TEST_AUTO_APPROVE: ${MERCADO_PAGO_TEST_AUTO_APPROVE:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  store-web:
    build:
      context: .
      dockerfile: apps/store-web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - api

volumes:
  postgres_data:
