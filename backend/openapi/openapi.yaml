openapi: 3.1.0
info:
  title: Store Platform API
  version: 1.0.0
  description: API REST da plataforma de vendas pós-pagas
servers:
  - url: http://localhost:8080/api/v1
tags:
  - name: auth
  - name: catalog
  - name: customers
  - name: sales
  - name: billing
  - name: payments
  - name: reports
  - name: admin
paths:
  /health:
    get:
      summary: Health check (serviço raiz em /health)
      servers:
        - url: http://localhost:8080
  /auth/login:
    post:
      tags: [auth]
      summary: Autenticar
      parameters:
        - name: X-App-Audience
          in: header
          schema:
            type: string
            enum: [store, admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, audience]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                audience: { type: string, enum: [store, admin] }
      responses:
        '200':
          description: Sessão criada (cookie)
  /auth/verify-email:
    get:
      tags: [auth]
      summary: Confirmar e-mail do cadastro
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: E-mail confirmado
  /auth/resend-verification:
    post:
      tags: [auth]
      summary: Reenviar e-mail de confirmação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '204':
          description: Aceito (sem revelar se o e-mail existe)
  /auth/accept-invitation:
    post:
      tags: [auth]
      summary: Aceitar convite administrativo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string }
                name: { type: string }
      responses:
        '204':
          description: Conta ativada
  /auth/logout:
    post:
      tags: [auth]
      summary: Encerrar sessão
      responses:
        '204':
          description: OK
  /auth/me:
    get:
      tags: [auth]
      summary: Usuário autenticado
      responses:
        '200':
          description: Perfil
  /catalog/products:
    get:
      tags: [catalog]
      summary: Catálogo público
      responses:
        '200':
          description: Lista de produtos
  /customers/register:
    post:
      tags: [customers]
      summary: Solicitar cadastro
      responses:
        '201':
          description: Cadastro recebido
  /me/cart:
    get:
      tags: [sales]
      summary: Carrinho
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Carrinho atual
  /me/cart/items:
    post:
      tags: [sales]
      summary: Adicionar item
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Carrinho atualizado
  /me/cart/checkout:
    post:
      tags: [sales]
      summary: Finalizar compra
      security: [{ cookieAuth: [] }]
      responses:
        '201':
          description: Pedido criado
  /me/invoices:
    get:
      tags: [billing]
      summary: Minhas faturas
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Lista de faturas
  /me/invoices/{id}:
    get:
      tags: [billing]
      summary: Detalhe da fatura
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Fatura
  /me/invoices/{id}/pix-charge:
    post:
      tags: [payments]
      summary: Gerar cobrança Pix
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Cobrança Pix
  /webhooks/pix:
    post:
      tags: [payments]
      summary: Webhook Pix (HMAC)
      parameters:
        - name: X-Webhook-Signature
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Processado
  /admin/users:
    get:
      tags: [admin]
      summary: Listar usuários internos
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Lista de usuários
  /admin/users/invitations:
    post:
      tags: [admin]
      summary: Convidar usuário interno
      security: [{ bearerAuth: [] }]
      responses:
        '204':
          description: Convite criado
  /admin/roles:
    get:
      tags: [admin]
      summary: Papéis internos
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Papéis
  /admin/customers:
    get:
      tags: [admin]
      summary: Listar clientes
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Clientes
  /admin/customers/{id}:
    get:
      tags: [admin]
      summary: Detalhe do cliente
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Cliente
        '404':
          description: Não encontrado
    patch:
      tags: [admin]
      summary: Atualizar cliente
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
                document: { type: string }
                collaborator_category_id: { type: string, format: uuid, nullable: true }
      responses:
        '200':
          description: Cliente atualizado
  /admin/customers/{id}/approve:
    patch:
      tags: [admin]
      summary: Aprovar cliente
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [credit_limit_cents]
              properties:
                credit_limit_cents: { type: integer, format: int64 }
      responses:
        '204':
          description: Aprovado
  /admin/customers/{id}/credit-limit:
    patch:
      tags: [admin]
      summary: Alterar limite de crédito
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [credit_limit_cents]
              properties:
                credit_limit_cents: { type: integer, format: int64 }
                reason: { type: string }
      responses:
        '204':
          description: Limite atualizado
  /admin/customers/{id}/block:
    patch:
      tags: [admin]
      summary: Bloquear cliente
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '204':
          description: Bloqueado
  /admin/customers/{id}/unblock:
    patch:
      tags: [admin]
      summary: Desbloquear cliente
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Desbloqueado
  /admin/customers/{id}/staff-role:
    post:
      tags: [admin]
      summary: Atribuir papel administrativo a um cliente
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_id]
              properties:
                role_id: { type: string, format: uuid }
                password: { type: string }
                mfa_code: { type: string }
      responses:
        '204':
          description: Papel atribuído
  /admin/collaborator-categories:
    get:
      tags: [admin]
      summary: Listar categorias de colaborador
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Lista de categorias
    post:
      tags: [admin]
      summary: Criar categoria de colaborador
      security: [{ cookieAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, margin_percent]
              properties:
                name: { type: string }
                slug: { type: string }
                margin_percent: { type: number }
      responses:
        '201':
          description: Categoria criada
  /admin/collaborator-categories/{id}:
    patch:
      tags: [admin]
      summary: Atualizar categoria de colaborador
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                margin_percent: { type: number }
                active: { type: boolean }
      responses:
        '200':
          description: Categoria atualizada
        '404':
          description: Não encontrada
  /admin/inventory/entries:
    post:
      tags: [admin]
      summary: Entrada de estoque
      security: [{ cookieAuth: [] }]
      responses:
        '201':
          description: Movimentação registrada
  /admin/billing/close:
    post:
      tags: [billing]
      summary: Fechar períodos em aberto (competência)
      security: [{ cookieAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                year: { type: integer }
                month: { type: integer }
      responses:
        '200':
          description: Resultado do fechamento
  /admin/billing/invoices:
    get:
      tags: [billing]
      summary: Todas as faturas
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Faturas
  /admin/billing/calendar:
    get:
      tags: [billing]
      summary: Calendário de dias úteis
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Entradas do calendário
    put:
      tags: [billing]
      summary: Atualizar dia do calendário
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Salvo
  /admin/reports/dashboard:
    get:
      tags: [reports]
      summary: Dashboard mensal
      security: [{ cookieAuth: [] }]
      parameters:
        - name: year
          in: query
          schema: { type: integer }
        - name: month
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: KPIs
  /admin/reports/top-products:
    get:
      tags: [reports]
      summary: Produtos mais vendidos
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Ranking
  /admin/reports/inventory:
    get:
      tags: [reports]
      summary: Posição de estoque
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Estoque
  /admin/reports/forecast:
    get:
      tags: [reports]
      summary: Previsões de compra
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Snapshots
  /admin/reports/forecast/generate:
    post:
      tags: [reports]
      summary: Gerar snapshots de previsão
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Contagem gerada
  /dev/pix/simulate/{chargeId}:
    post:
      tags: [payments]
      summary: Simular pagamento Pix (somente desenvolvimento)
      parameters:
        - name: chargeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Pagamento simulado
components:
  schemas:
    AdminCustomer:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        document: { type: string }
        status: { type: string }
        credit_limit_cents: { type: integer, format: int64 }
        current_exposure_cents: { type: integer, format: int64 }
        email_verified: { type: boolean }
        collaborator_category_id: { type: string, format: uuid }
        collaborator_category_name: { type: string }
        blocked_reason: { type: string }
        staff_roles: { type: array, items: { type: string } }
        open_invoices_count: { type: integer }
        overdue_invoices_count: { type: integer }
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: store_session
