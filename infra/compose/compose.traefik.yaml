# Stack Store Platform atrás de Traefik (VPS compartilhada / Portainer).
# Sem Caddy; sem portas 80/443 no host. Requer rede Docker externa do Traefik.
# Uso: COMPOSE_FILE=infra/compose/compose.traefik.yaml

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-store}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-store}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  migrate:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: migrate
    image: ${STORE_MIGRATE_IMAGE:-store-platform-migrate:local}
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: api
    image: ${STORE_API_IMAGE:-store-platform-api:local}
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      HTTP_ADDR: ":8080"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      COOKIE_SECURE: "true"
      SESSION_SECRET: ${SESSION_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      ADMIN_MFA_REQUIRED: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks: [internal, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.store-health.rule=Host(`${DOMAIN}`) && Path(`/health`)
      - traefik.http.routers.store-health.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.store-health.tls=true
      - traefik.http.routers.store-health.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.store-health.priority=100
      - traefik.http.routers.store-health.service=store-health
      - traefik.http.services.store-health.loadbalancer.server.port=8080

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: worker
    image: ${STORE_WORKER_IMAGE:-store-platform-worker:local}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-10s}
      WORKER_ID: ${WORKER_ID:-worker-1}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  store-web:
    build:
      context: ../..
      dockerfile: apps/store-web/Dockerfile
    image: ${STORE_WEB_IMAGE:-store-platform-store-web:local}
    restart: unless-stopped
    networks: [internal, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.store-web.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.store-web.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.store-web.tls=true
      - traefik.http.routers.store-web.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.store-web.service=store-web
      - traefik.http.services.store-web.loadbalancer.server.port=80

  admin-web:
    build:
      context: ../..
      dockerfile: apps/admin-web/Dockerfile
    image: ${STORE_ADMIN_WEB_IMAGE:-store-platform-admin-web:local}
    restart: unless-stopped
    networks: [internal, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.store-admin.rule=Host(`${ADMIN_DOMAIN}`)
      - traefik.http.routers.store-admin.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.store-admin.tls=true
      - traefik.http.routers.store-admin.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.store-admin.service=store-admin
      - traefik.http.services.store-admin.loadbalancer.server.port=80

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
  internal:
    internal: true

volumes:
  postgres_data:
